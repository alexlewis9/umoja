hero:
  title: About UMOJA
  subtitle: We are a youth-centered organization using basketball to grow confidence and opportunity.

mission:
  title: Our Mission
  content: >
    Our mission is to equip youth with the tools to lead healthy, purpose-driven lives.
    Through coaching, mentorship, and access to resources, we help young people discover
    their strengths and use them to uplift their communities.
  images:
    - src: https://images.unsplash.com/photo-1546519638-68e109498ffc?auto=format&fit=crop&w=1200&q=80
      alt: Youth players practicing basketball drills
    - src: https://images.unsplash.com/photo-1519861531473-9200262188bf?auto=format&fit=crop&w=1200&q=80
      alt: Youth team in a huddle

story:
  title: Our Story
  content: >
    UMOJA started as a neighbourhood initiative led by coaches and volunteers who wanted
    a safe, positive space for youth. It has grown into a multi-program community effort 
    connecting families, athletes, mentors, and local partners.
  images:
    - src: https://images.unsplash.com/photo-1519861531473-9200262188bf?auto=format&fit=crop&w=1200&q=80
      alt: Youth team gathering for a community event
    - src: https://images.unsplash.com/photo-1546519638-68e109498ffc?auto=format&fit=crop&w=1200&q=80
      alt: Basketball training session in progress
    - src: https://images.unsplash.com/photo-1574623452334-1e0ac2b3ccb4?auto=format&fit=crop&w=1200&q=80
      alt: Players competing during a basketball game

team:
  title: Meet Our Team
  subtitle: Dedicated leaders committed to youth development and community impact.
